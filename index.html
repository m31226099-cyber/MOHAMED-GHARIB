<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOHAMED PLAY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
* { font-family: 'Cairo', sans-serif; }
html { scroll-behavior: smooth; }
body { overflow-x: hidden; }
.rainbow-text {
  background: linear-gradient(90deg, #ff0080, #ff8c00, #ffed00, #00ff00, #00ffee, #0080ff, #8000ff, #ff0080);
  background-size: 400% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow 3s linear infinite;
}
@keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
.intro-fade-out { animation: fadeOut 1s ease-in-out forwards; }
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
.app-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.app-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
.nav-btn.active { color: #01875f; position: relative; }
.nav-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 30px; height: 3px; background: #01875f; border-radius: 2px; }
.drawer-overlay,.modal-backdrop { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
.loader { border-top-color: #01875f; animation: spinner 0.6s linear infinite; }
@keyframes spinner { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-white">

<div id="introScreen" class="fixed inset-0 bg-black z-50 flex items-center justify-center">
  <div class="text-center px-4">
    <h1 class="text-4xl md:text-7xl font-extrabold rainbow-text mb-6">MOHAMED PLAY STORE</h1>
    <p class="text-gray-400 text-lg md:text-xl">متجر التطبيقات المصنوعة بـواسطه MOHAMED GHARIB</p>
    <div class="mt-8 flex justify-center"><div class="w-12 h-12 border-4 border-gray-700 border-t-white rounded-full animate-spin"></div></div>
  </div>
</div>

<div id="mainApp" class="hidden min-h-screen flex flex-col">
  <header class="sticky top-0 z-40 bg-white border-b border-gray-200 shadow-sm">
    <div class="mx-auto px-3 md:px-6 py-3">
      <div class="flex items-center justify-between gap-3">
        <button id="menuBtn" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="menu" class="w-6 h-6 text-gray-700"></i></button>
        <div class="flex-1 max-w-3xl">
          <div class="relative">
            <input type="text" id="searchInput" placeholder="البحث عن التطبيقات والألعاب" class="w-full px-4 py-2.5 pr-11 bg-gray-100 border-0 rounded-full text-sm md:text-base focus:outline-none focus:ring-2 focus:ring-[#01875f] focus:bg-white">
            <i data-lucide="search" class="absolute right-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
          </div>
        </div>
        <h1 id="logoBtn" class="text-lg md:text-2xl font-extrabold cursor-pointer select-none"><span class="rainbow-text">MOHAMED</span><span class="text-gray-800"> PLAY STORE</span></h1>
      </div>
    </div>
  </header>

  <main class="flex-1 pb-20 md:pb-6">
    <div class="max-w-7xl mx-auto px-3 md:px-6 py-4 md:py-6">
      <div class="mb-6">
        <h2 id="sectionTitle" class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">التطبيقات المميزة</h2>
        <p id="sectionDesc" class="text-gray-600 text-sm md:text-base">اكتشف أفضل التطبيقات</p>
      </div>
      <div id="loadingApps" class="hidden text-center py-16">
        <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-200 h-16 w-16 mx-auto mb-4"></div>
        <p class="text-gray-500">جاري تحميل التطبيقات...</p>
      </div>
      <div id="appsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5"></div>
      <div id="noResults" class="hidden text-center py-16">
        <i data-lucide="search-x" class="w-16 h-16 text-gray-300 mx-auto mb-4"></i>
        <h3 class="text-xl font-bold text-gray-700 mb-2">لا توجد نتائج</h3>
        <p class="text-gray-500">جرب البحث بكلمات مختلفة</p>
      </div>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-30 md:hidden">
    <div class="flex items-center justify-around py-2">
      <button data-nav="home" class="nav-btn active flex-col items-center gap-1 px-4 py-2"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-xs font-semibold">الرئيسية</span></button>
      <button data-nav="games" class="nav-btn flex flex-col items-center gap-1 px-4 py-2 text-gray-600"><i data-lucide="gamepad-2" class="w-5 h-5"></i><span class="text-xs font-semibold">الألعاب</span></button>
      <button data-nav="apps" class="nav-btn flex-col items-center gap-1 px-4 py-2 text-gray-600"><i data-lucide="smartphone" class="w-5 h-5"></i><span class="text-xs font-semibold">التطبيقات</span></button>
      <button data-nav="kids" class="nav-btn flex flex-col items-center gap-1 px-4 py-2 text-gray-600"><i data-lucide="baby" class="w-5 h-5"></i><span class="text-xs font-semibold">الأطفال</span></button>
    </div>
  </nav>
</div>

<div id="appModal" class="fixed inset-0 modal-backdrop z-50 hidden items-center justify-center p-3 md:p-6">
  <div class="bg-white rounded-3xl max-w-4xl w-full max-h- overflow-hidden flex flex-col shadow-2xl" id="modalContent"></div>
</div>

<div id="toast" class="fixed bottom-24 md:bottom-6 right-4 left-4 md:right-auto md:max-w-sm bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-[70]">
  <div class="flex items-center gap-3"><i data-lucide="check-circle" class="w-5 h-5 text-green-400 flex-shrink-0"></i><p id="toastMessage" class="font-semibold"></p></div>
</div>

<script type="module">
// الكود شغال بدون Firebase دلوقتي - بتطبيقات تجريبية
let currentSection = 'home';

// حطيتلك تطبيق تجريبي هنا
const allAppsData = {
  "app1": {
    id: "app1",
    name: "لعبة محمد المغامر",
    developer: "MOHAMED GHARIB",
    category: "games",
    size: "45.2 MB",
    icon: "https://cdn-icons-png.flaticon.com/512/5968/5968705.png",
    downloadUrl: "https://google.com",
    description: "مغامرة رائعة في عالم محمد. اجمع النقاط وتخطى العقبات واستمتع بجرافيك مذهل. اللعبة مجانية 100%",
    screenshots: [
      "https://via.placeholder.com/400x800/01875f/ffffff?text=Screen1",
      "https://via.placeholder.com/400x800/ff0080/ffffff?text=Screen2"
    ],
    features: [
      "جرافيك عالي الجودة",
      "مستويات لا نهائية",
      "تعمل بدون نت",
      "مجانية بالكامل"
    ],
    downloads: 1250,
    views: 5400,
    rating: 4.8
  },
  "app2": {
    id: "app2",
    name: "تطبيق المهام",
    developer: "MOHAMED GHARIB",
    category: "apps",
    size: "12.5 MB",
    icon: "https://cdn-icons-png.flaticon.com/512/5968/5968705.png",
    downloadUrl: "https://google.com",
    description: "نظم مهامك اليومية بسهولة. واجهة بسيطة وسريعة",
    screenshots: [],
    features: ["سريع", "بسيط"],
    downloads: 320,
    views: 1100,
    rating: 4.5
  }
};

document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  setTimeout(() => {
    document.getElementById('introScreen').classList.add('intro-fade-out');
    setTimeout(() => {
      document.getElementById('introScreen').style.display = 'none';
      document.getElementById('mainApp').classList.remove('hidden');
      loadApps(currentSection);
    }, 1000);
  }, 3000);
  setupEventListeners();
});

function setupEventListeners() {
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', (e) => switchSection(e.currentTarget.dataset.nav));
  });
  document.getElementById('searchInput').addEventListener('input', handleSearch);
  document.getElementById('appModal').addEventListener('click', (e) => { if (e.target.id === 'appModal') closeAppModal(); });
}

function switchSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.remove('active', 'text-[#01875f]'); btn.classList.add('text-gray-600');
    if (btn.dataset.nav === section) { btn.classList.add('active', 'text-[#01875f]'); btn.classList.remove('text-gray-600'); }
  });
  const titles = { home: { title: 'التطبيقات المميزة', desc: 'اكتشف أفضل التطبيقات' }, games: { title: 'الألعاب', desc: 'مجموعة من الألعاب الممتعة' }, apps: { title: 'التطبيقات', desc: 'تطبيقات عملية' }, kids: { title: 'تطبيقات الأطفال', desc: 'محتوى آمن وتعليمي' } };
  document.getElementById('sectionTitle').textContent = titles[section].title;
  document.getElementById('sectionDesc').textContent = titles[section].desc;
  loadApps(section); window.scrollTo({ top: 0, behavior: 'smooth' });
}

function loadApps(section, searchTerm = '') {
  const apps = Object.values(allAppsData);
  let appsToShow = section === 'home'? apps : apps.filter(app => app.category === section);
  let filteredApps = searchTerm? appsToShow.filter(app => app.name.toLowerCase().includes(searchTerm.toLowerCase())) : appsToShow;
  renderApps(filteredApps);
}

function renderApps(apps) {
  const grid = document.getElementById('appsGrid');
  const noResults = document.getElementById('noResults');
  if (apps.length === 0) { grid.innerHTML = ''; noResults.classList.remove('hidden'); return; }
  noResults.classList.add('hidden');
  grid.innerHTML = apps.map(app => `
    <div class="app-card bg-white rounded-2xl p-4 cursor-pointer border border-gray-200" onclick="showAppDetail('${app.id}')">
      <div class="flex gap-3 mb-3">
        <img src="${app.icon}" alt="${app.name}" class="w-16 h-16 rounded-2xl object-cover flex-shrink-0">
        <div class="flex-1 min-w-0">
          <h3 class="font-bold text-gray-900 text-base mb-1 truncate">${app.name}</h3>
          <p class="text-sm text-gray-600 mb-1">${app.developer}</p>
          <div class="flex items-center gap-2 text-xs text-gray-500">
            <span class="flex items-center gap-1"><span>${app.rating}</span><i data-lucide="star" class="w-3 h-3 fill-yellow-400 text-yellow-400"></i></span>
            <span>•</span><span>${app.size}</span>
          </div>
        </div>
      </div>
      <p class="text-xs text-gray-600 mb-3 line-clamp-2">${app.description}</p>
      <div class="flex gap-2">
        <span class="px-3 py-1 bg-green-50 text-[#01875f] text-xs font-semibold rounded-full">${getCategoryName(app.category)}</span>
        <span class="px-3 py-1 bg-gray-100 text-gray-700 text-xs font-semibold rounded-full">${app.downloads} تحميل</span>
      </div>
    </div>
  `).join(''); lucide.createIcons();
}

function getCategoryName(cat) { const names = { home: 'مميز', games: 'ألعاب', apps: 'تطبيقات', kids: 'أطفال' }; return names[cat] || cat; }
function handleSearch(e) { loadApps(currentSection, e.target.value.trim()); }

window.showAppDetail = function(appId) {
  const app = allAppsData[appId]; if (!app) return;
  const modal = document.getElementById('appModal'); const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="overflow-y-auto">
      <div class="sticky top-0 bg-white border-b px-4 md:px-6 py-4 flex items-center justify-between z-10"><button onclick="closeAppModal()" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button></div>
      <div class="p-4 md:p-6">
        <div class="flex gap-4 mb-6">
          <img src="${app.icon}" class="w-20 h-20 md:w-24 md:h-24 rounded-3xl object-cover shadow-lg">
          <div><h2 class="text-xl md:text-2xl font-bold mb-1">${app.name}</h2><p class="text-[#01875f] font-semibold mb-2">${app.developer}</p></div>
        </div>
        <button onclick="window.open('${app.downloadUrl}', '_blank')" class="w-full bg-[#01875f] hover:bg-[#016b47] text-white font-bold py-3.5 rounded-full mb-6 text-lg">تحميل الآن</button>
        <p class="text-gray-700 leading-relaxed">${app.description}</p>
      </div>
    </div>`;
  modal.classList.remove('hidden'); modal.classList.add('flex'); lucide.createIcons(); document.body.style.overflow = 'hidden';
}
window.closeAppModal = function() { document.getElementById('appModal').classList.add('hidden'); document.getElementById('appModal').classList.remove('flex'); document.body.style.overflow = ''; }
</script>
</body>
</html>

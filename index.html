<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOHAMED PLAY STORE</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  if (localStorage.getItem('darkMode') === 'true') {
    document.documentElement.classList.add('dark')
  }
  tailwind.config = { darkMode: 'class' }
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
  body { font-family: 'Cairo', sans-serif; }
 .dark body { background-color: #111827; color: white; }
 .dark.bg-white { background-color: #1f2937!important; }
 .dark.bg-gray-50 { background-color: #374151!important; }
 .dark.text-gray-600 { color: #d1d5db!important; }
 .dark.border { border-color: #4b5563!important; }
</style>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, increment, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "حط_مفتاحك_هنا",
    authDomain: "mohamed-play-store.firebaseapp.com",
    projectId: "mohamed-play-store",
    storageBucket: "mohamed-play-store.appspot.com",
    messagingSenderId: "حط_الرقم_هنا",
    appId: "حط_الايدي_هنا"
  };

  const app = initializeApp(firebaseConfig);
  window.db = getFirestore(app);
  window.firebaseUtils = { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, increment, onSnapshot, query, orderBy };
</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900">

<!-- الهيدر -->
<header class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-40">
  <div class="container mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button id="menuBtn"><i data-lucide="menu"></i></button>
      <h1 id="logo" class="text-xl font-bold text-[#01875f] cursor-pointer">MOHAMED PLAY STORE</h1>
    </div>
    <input type="text" id="searchInput" placeholder="ابحث عن تطبيق..." class="hidden md:block px-4 py-2 rounded-xl border dark:bg-gray-700">
  </div>
</header>

<!-- القائمة الجانبية -->
<div id="drawer" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
  <div class="w-64 h-full bg-white dark:bg-gray-800 p-4">
    <button id="closeDrawer" class="mb-4"><i data-lucide="x"></i></button>
    <nav>
      <a href="#" class="drawer-link flex gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 mb-2"><i data-lucide="home"></i><span>الرئيسية</span></a>
      <a href="#" data-modal="settings" class="drawer-link flex gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 mb-2"><i data-lucide="settings"></i><span>الإعدادات</span></a>
      <a href="#" data-modal="contact" class="drawer-link flex gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 mb-2"><i data-lucide="mail"></i><span>تواصل معنا</span></a>
      <a href="#" data-modal="about" class="drawer-link flex gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 mb-2"><i data-lucide="info"></i><span>حول المتجر</span></a>
    </nav>
  </div>
</div>

<!-- المحتوى -->
<main class="container mx-auto px-4 py-6">
  <div id="appsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
</main>

<!-- مودال عام -->
<div id="genericModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
  <div id="genericModalContent" class="bg-white dark:bg-gray-800 rounded-2xl w-11/12 max-w-lg max-h-[90vh] overflow-y-auto"></div>
</div>

<!-- مودال التفاصيل -->
<div id="appDetailModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
  <div id="appDetailContent" class="bg-white dark:bg-gray-800 rounded-2xl w-11/12 max-w-2xl p-6"></div>
</div>

<!-- مودال الادمن -->
<div id="adminModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
  <div class="bg-white dark:bg-gray-800 rounded-2xl w-11/12 max-w-4xl p-6 max-h-[90vh] overflow-y-auto">
    <h3 class="text-2xl font-bold mb-4">لوحة التحكم</h3>
    <form id="addAppForm" class="space-y-3 mb-6">
      <input id="appName" placeholder="اسم التطبيق" required class="w-full p-2 border rounded-xl dark:bg-gray-700">
      <input id="appDev" placeholder="المطور" required class="w-full p-2 border rounded-xl dark:bg-gray-700">
      <select id="appCat" class="w-full p-2 border rounded-xl dark:bg-gray-700">
        <option value="games">ألعاب</option>
        <option value="apps">تطبيقات</option>
        <option value="kids">أطفال</option>
      </select>
      <input id="appIcon" placeholder="رابط الايقونة" required class="w-full p-2 border rounded-xl dark:bg-gray-700">
      <input id="appDownload" placeholder="رابط التحميل" required class="w-full p-2 border rounded-xl dark:bg-gray-700">
      <textarea id="appDesc" placeholder="الوصف" class="w-full p-2 border rounded-xl dark:bg-gray-700"></textarea>
      <button type="submit" class="w-full bg-[#01875f] text-white py-2 rounded-xl font-bold">إضافة التطبيق</button>
    </form>
    <div id="adminAppsList"></div>
    <button onclick="closeAdminModal()" class="mt-4 w-full bg-gray-500 text-white py-2 rounded-xl">إغلاق</button>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-5 right-5 bg-green-600 text-white px-4 py-2 rounded-xl hidden"></div>
<script type="module">
const { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, increment, onSnapshot, query, orderBy } = window.firebaseUtils;
const db = window.db;

let clickCount = 0;
let apps = [];

// فتح وقفل القائمة
document.getElementById('menuBtn').onclick = () => document.getElementById('drawer').classList.remove('hidden');
document.getElementById('closeDrawer').onclick = () => document.getElementById('drawer').classList.add('hidden');

// ضغط اللوجو 5 مرات للادمن
document.getElementById('logo').onclick = () => {
  clickCount++;
  if(clickCount >= 5) {
    const pass = prompt('كلمة السر:');
    if(pass === 'mohamed123') document.getElementById('adminModal').classList.remove('hidden');
    clickCount = 0;
  }
};

function closeAdminModal() { document.getElementById('adminModal').classList.add('hidden'); }
window.closeAdminModal = closeAdminModal;

// جلب التطبيقات من Firebase
const q = query(collection(db, "apps"), orderBy("date", "desc"));
onSnapshot(q, (snapshot) => {
  apps = [];
  snapshot.forEach(doc => apps.push({id: doc.id,...doc.data()}));
  renderApps(apps);
  renderAdminApps();
});

// اضافة تطبيق
document.getElementById('addAppForm').onsubmit = async (e) => {
  e.preventDefault();
  await addDoc(collection(db, "apps"), {
    name: appName.value, dev: appDev.value, cat: appCat.value,
    icon: appIcon.value, download: appDownload.value, desc: appDesc.value,
    views: 0, downloads: 0, date: new Date().toISOString()
  });
  e.target.reset();
  showToast('تم اضافة التطبيق');
};

// عرض التطبيقات
function renderApps(list) {
  appsGrid.innerHTML = list.map(app => `
    <div onclick="openAppDetail('${app.id}')" class="bg-white dark:bg-gray-800 rounded-xl p-3 shadow cursor-pointer hover:scale-105 transition">
      <img src="${app.icon}" class="w-full aspect-square rounded-xl mb-2">
      <p class="font-bold text-sm truncate">${app.name}</p>
      <p class="text-xs text-gray-500">${app.dev}</p>
    </div>
  `).join('');
}

// تفاصيل التطبيق
window.openAppDetail = async (id) => {
  const app = apps.find(a => a.id === id);
  await updateDoc(doc(db, "apps", id), { views: increment(1) });
  appDetailContent.innerHTML = `
    <img src="${app.icon}" class="w-24 h-24 rounded-2xl mb-4">
    <h3 class="text-2xl font-bold">${app.name}</h3>
    <p class="text-gray-500 mb-4">${app.dev}</p>
    <p class="mb-4">${app.desc}</p>
    <a href="${app.download}" target="_blank" onclick="incrementDownload('${id}')" class="block w-full bg-[#01875f] text-white text-center py-3 rounded-xl font-bold">تحميل</a>
    <button onclick="closeAppDetail()" class="mt-2 w-full bg-gray-200 dark:bg-gray-700 py-2 rounded-xl">إغلاق</button>
  `;
  appDetailModal.classList.remove('hidden');
  appDetailModal.classList.add('flex');
};
window.closeAppDetail = () => appDetailModal.classList.add('hidden');
window.incrementDownload = (id) => updateDoc(doc(db, "apps", id), { downloads: increment(1) });

// لوحة الادمن
function renderAdminApps() {
  adminAppsList.innerHTML = apps.map(app => `
    <div class="flex justify-between items-center p-2 border-b">
      <span>${app.name}</span>
      <button onclick="deleteApp('${app.id}')" class="text-red-500">حذف</button>
    </div>
  `).join('');
}
window.deleteApp = (id) => deleteDoc(doc(db, "apps", id));

// المودالات العامة
function showGenericModal(type) {
  const modal = document.getElementById('genericModal');
  const content = document.getElementById('genericModalContent');

  if(type === 'settings') {
    const notifications = localStorage.getItem('notifications') === 'true';
    const darkMode = localStorage.getItem('darkMode') === 'true';
    content.innerHTML = `
    <div class="p-6">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold">الإعدادات</h3>
        <button onclick="closeGenericModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="space-y-4">
        <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-xl">
          <div><p class="font-semibold">إشعارات التطبيقات الجديدة</p></div>
          <input type="checkbox" id="notifToggle" ${notifications? 'checked' : ''}>
        </div>
        <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-xl">
          <div><p class="font-semibold">الوضع الليلي</p></div>
          <input type="checkbox" id="darkToggle" ${darkMode? 'checked' : ''}>
        </div>
        <button onclick="clearCache()" class="w-full bg-red-500 text-white py-2 rounded-xl">مسح الكاش</button>
      </div>
    </div>`;
    setTimeout(() => {
      notifToggle.onchange = e => localStorage.setItem('notifications', e.target.checked);
      darkToggle.onchange = e => { localStorage.setItem('darkMode', e.target.checked); toggleDarkMode(e.target.checked); };
      lucide.createIcons();
    }, 100);
  }
  else if(type === 'contact') {
    content.innerHTML = `<div class="p-6"><h3 class="text-2xl font-bold">تواصل معنا</h3><p>ابعتلنا رسالتك</p><button onclick="closeGenericModal()" class="mt-4 w-full bg-[#01875f] text-white py-2 rounded-xl">إغلاق</button></div>`;
  }
  else {
    content.innerHTML = `<div class="p-6"><h3 class="text-2xl font-bold">حول المتجر</h3><p>متجر MOHAMED PLAY STORE</p><button onclick="closeGenericModal()" class="mt-4 w-full bg-[#01875f] text-white py-2 rounded-xl">إغلاق</button></div>`;
  }
  modal.classList.remove('hidden'); modal.classList.add('flex'); lucide.createIcons();
}
window.closeGenericModal = () => genericModal.classList.add('hidden');

document.querySelectorAll('.drawer-link').forEach(link => {
  link.onclick = (e) => {
    const type = e.currentTarget.dataset.modal;
    if(type) showGenericModal(type);
    document.getElementById('drawer').classList.add('hidden');
  }
});

// دوال مساعدة
function toggleDarkMode(isDark) {
  if(isDark) document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
}
function clearCache() { localStorage.clear(); showToast('تم المسح'); location.reload(); }
function showToast(msg) {
  toast.textContent = msg; toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 2000);
}

lucide.createIcons();
</script>
</body>
</html>

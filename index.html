<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOHAMED PLAY STORE</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  if (localStorage.getItem('darkMode') === 'true') {
    document.documentElement.classList.add('dark')
  }
  tailwind.config = { darkMode: 'class' }
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
  body { font-family: 'Cairo', sans-serif; }
.dark body { background-color: #111827; color: white; }
.dark.bg-white { background-color: #1f2937!important; }
.dark.bg-gray-50 { background-color: #374151!important; }
.dark.bg-gray-100 { background-color: #374151!important; }
.dark.text-gray-600 { color: #d1d5db!important; }
.dark.text-gray-800 { color: #f3f4f6!important; }
.dark.border-gray-200 { border-color: #4b5563!important; }
 .rainbow-text { background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
 .loader { border-top-color: #01875f; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
 .intro-fade-out { opacity: 0; transition: opacity 1s ease-out; }
 .modal-backdrop { background-color: rgba(0,0,0,0.6); }
 .drawer-overlay { background-color: rgba(0,0,0,0.5); }
 .app-card { transition: all 0.3s; }
 .app-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
</style>

<!-- شاشة المقدمة -->
<div id="introScreen" class="fixed inset-0 z-[100] flex items-center justify-center bg-white dark:bg-gray-900">
  <h1 class="text-4xl font-extrabold"><span class="rainbow-text">MOHAMED</span> <span class="text-gray-800 dark:text-white">PLAY STORE</span></h1>
</div>

<!-- تسجيل دخول الادمن -->
<div id="adminLoginModal" class="fixed inset-0 modal-backdrop z-50 hidden items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-800 rounded-2xl max-w-sm w-full p-6 shadow-2xl">
    <h3 class="text-2xl font-bold mb-4">دخول لوحة التحكم</h3>
    <form id="adminLoginForm">
      <input type="password" id="adminPassword" placeholder="كلمة السر" required class="w-full px-4 py-2.5 border rounded-xl mb-3 dark:bg-gray-700">
      <p id="loginError" class="text-red-500 text-sm mb-3 hidden"></p>
      <button type="submit" class="w-full bg-[#01875f] text-white font-bold py-3 rounded-xl">دخول</button>
      <button type="button" onclick="closeAdminLogin()" class="w-full mt-2 bg-gray-200 dark:bg-gray-700 font-bold py-3 rounded-xl">إلغاء</button>
    </form>
  </div>
</div>

<!-- لوحة الادمن -->
<div id="adminDashboard" class="fixed inset-0 bg-gray-100 dark:bg-gray-900 z-50 hidden overflow-y-auto">
  <header class="bg-white dark:bg-gray-800 shadow-sm p-4 flex justify-between items-center sticky top-0">
    <h2 class="text-2xl font-bold">لوحة التحكم</h2>
    <div class="flex gap-2">
      <button onclick="adminLogout()" class="px-4 py-2 bg-red-500 text-white rounded-xl">خروج</button>
      <button onclick="closeAdminDashboard()" class="px-4 py-2 bg-gray-500 text-white rounded-xl">إغلاق</button>
    </div>
  </header>
  <div class="max-w-4xl mx-auto p-6">
    <div class="grid md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm"><p class="text-gray-600">إجمالي التطبيقات</p><p id="totalApps" class="text-3xl font-bold">0</p></div>
      <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm"><p class="text-gray-600">إجمالي التحميلات</p><p id="totalDownloads" class="text-3xl font-bold">0</p></div>
      <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm"><p class="text-gray-600">إجمالي المشاهدات</p><p id="totalViews" class="text-3xl font-bold">0</p></div>
    </div>
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border-gray-200 dark:border-gray-700 mb-6">
      <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="w-5 h-5 text-[#01875f]"></i><span>إضافة تطبيق جديد</span></h3>
      <form id="addAppForm" class="space-y-4">
        <div class="grid md:grid-cols-2 gap-4">
          <div><label class="block text-sm font-semibold mb-2">اسم التطبيق *</label><input type="text" id="appName" required class="w-full px-4 py-2.5 border rounded-xl dark:bg-gray-700"></div>
          <div><label class="block text-sm font-semibold mb-2">المطور *</label><input type="text" id="appDeveloper" required class="w-full px-4 py-2.5 border rounded-xl dark:bg-gray-700"></div>
          <div><label class="block text-sm font-semibold mb-2">التصنيف *</label>
            <select id="appCategory" required class="w-full px-4 py-2.5 border rounded-xl dark:bg-gray-700">
              <option value="">اختر</option><option value="home">الرئيسية</option><option value="games">الألعاب</option><option value="apps">التطبيقات</option><option value="kids">الأطفال</option>
            </select>
          </div>
          <div><label class="block text-sm font-semibold mb-2">الحجم *</label><input type="text" id="appSize" required class="w-full px-4 py-2.5 border rounded-xl dark:bg-gray-700" placeholder="10.5 MB"></div>
          <div><label class="block text-sm font-semibold mb-2">رابط الأيقونة *</label><input type="url" id="appIcon" required class="w-full px-4 py-2.5 border rounded-xl dark:bg-gray-700"></div>
          <div><label class="block text-sm font-semibold mb-2">رابط التحميل *</label><input type="url" id="appDownloadUrl" required class="w-full px-4 py-2.5 border rounded-xl dark:bg-gray-700"></div>
        </div>
        <div><label class="block text-sm font-semibold mb-2">الوصف *</label><textarea id="appDescription" required rows="3" class="w-full px-4 py-2.5 border rounded-xl resize-none dark:bg-gray-700"></textarea></div>
        <div><label class="block text-sm font-semibold mb-2">صور لقطات الشاشة</label><textarea id="appScreenshots" rows="3" class="w-full px-4 py-2.5 border rounded-xl resize-none dark:bg-gray-700"></textarea></div>
        <div><label class="block text-sm font-semibold mb-2">المميزات</label><textarea id="appFeatures" rows="4" class="w-full px-4 py-2.5 border rounded-xl resize-none dark:bg-gray-700"></textarea></div>
        <button type="submit" class="w-full bg-[#01875f] hover:bg-[#016b47] text-white font-bold py-3.5 rounded-xl">إضافة التطبيق</button>
      </form>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border-gray-200 dark:border-gray-700">
      <h3 class="text-xl font-bold mb-4">إدارة التطبيقات</h3>
      <div id="appsListAdmin" class="space-y-3 max-h-[600px] overflow-y-auto"></div>
    </div>
  </div>
</div>

<div id="mainApp" class="hidden min-h-screen flex-col">
  <header class="sticky top-0 z-40 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm">
    <div class="mx-auto px-3 md:px-6 py-3">
      <div class="flex items-center justify-between gap-3">
        <button id="menuBtn" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full"><i data-lucide="menu" class="w-6 h-6"></i></button>
        <div class="flex-1 max-w-3xl">
          <div class="relative">
            <input type="text" id="searchInput" placeholder="البحث عن التطبيقات والألعاب" class="w-full px-4 py-2.5 pr-11 bg-gray-100 dark:bg-gray-700 border-0 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-[#01875f]">
            <i data-lucide="search" class="absolute right-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
          </div>
        </div>
        <h1 id="logoBtn" class="text-lg md:text-2xl font-extrabold cursor-pointer"><span class="rainbow-text">MOHAMED</span><span class="text-gray-800 dark:text-white"> PLAY STORE</span></h1>
      </div>
    </div>
  </header>

  <div id="drawerOverlay" class="fixed inset-0 drawer-overlay z-50 hidden opacity-0 transition-opacity duration-300">
    <div id="drawer" class="absolute right-0 top-0 h-full w-72 bg-white dark:bg-gray-800 shadow-2xl transform translate-x-full transition-transform duration-300">
      <div class="p-6 border-b dark:border-gray-700"><div class="flex items-center justify-between mb-4"><h2 class="text-xl font-bold">القائمة</h2><button id="closeDrawer" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button></div></div>
      <nav class="p-4">
        <a href="#" data-page="home" class="drawer-link flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 mb-2"><i data-lucide="home" class="w-5 h-5"></i><span class="font-semibold">الرئيسية</span></a>
        <a href="#" data-modal="settings" class="drawer-link flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 mb-2"><i data-lucide="settings" class="w-5 h-5"></i><span class="font-semibold">الإعدادات</span></a>
        <a href="#" data-modal="about" class="drawer-link flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 mb-2"><i data-lucide="info" class="w-5 h-5"></i><span class="font-semibold">حول</span></a>
        <a href="#" data-modal="contact" class="drawer-link flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 mb-2"><i data-lucide="mail" class="w-5 h-5"></i><span class="font-semibold">تواصل معنا</span></a>
      </nav>
    </div>
  </div>

  <main class="flex-1 pb-20 md:pb-6">
    <div class="max-w-7xl mx-auto px-3 md:px-6 py-4 md:py-6">
      <div class="mb-6"><h2 id="sectionTitle" class="text-2xl md:text-3xl font-bold">التطبيقات المميزة</h2><p id="sectionDesc" class="text-gray-600 dark:text-gray-400">اكتشف أفضل التطبيقات</p></div>
      <div id="loadingApps" class="hidden text-center py-16"><div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-200 h-16 w-16 mx-auto mb-4"></div><p>جاري تحميل التطبيقات...</p></div>
      <div id="appsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5"></div>
      <div id="noResults" class="hidden text-center py-16"><i data-lucide="search-x" class="w-16 h-16 text-gray-300 mx-auto mb-4"></i><h3 class="text-xl font-bold">لا توجد نتائج</h3></div>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t dark:border-gray-700 z-30 md:hidden">
    <div class="flex items-center justify-around py-2">
      <button data-nav="home" class="nav-btn active flex-col items-center gap-1 px-4 py-2 text-[#01875f]"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-xs font-semibold">الرئيسية</span></button>
      <button data-nav="games" class="nav-btn flex-col items-center gap-1 px-4 py-2 text-gray-600 dark:text-gray-400"><i data-lucide="gamepad-2" class="w-5 h-5"></i><span class="text-xs font-semibold">الألعاب</span></button>
      <button data-nav="apps" class="nav-btn flex flex-col items-center gap-1 px-4 py-2 text-gray-600 dark:text-gray-400"><i data-lucide="smartphone" class="w-5 h-5"></i><span class="text-xs font-semibold">التطبيقات</span></button>
      <button data-nav="kids" class="nav-btn flex-col items-center gap-1 px-4 py-2 text-gray-600 dark:text-gray-400"><i data-lucide="baby" class="w-5 h-5"></i><span class="text-xs font-semibold">الأطفال</span></button>
    </div>
  </nav>
</div>

<div id="appModal" class="fixed inset-0 modal-backdrop z-50 hidden items-center justify-center p-3"><div class="bg-white dark:bg-gray-800 rounded-3xl max-w-4xl w-full max-h- overflow-hidden flex flex-col shadow-2xl" id="modalContent"></div></div>
<div id="genericModal" class="fixed inset-0 modal-backdrop z-50 hidden items-center justify-center p-4"><div class="bg-white dark:bg-gray-800 rounded-2xl max-w-lg w-full shadow-2xl" id="genericModalContent"></div></div>
<div id="toast" class="fixed bottom-24 right-4 left-4 md:right-auto md:max-w-sm bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-[70]"><div class="flex items-center gap-3"><i data-lucide="check-circle" class="w-5 h-5 text-green-400"></i><p id="toastMessage" class="font-semibold"></p></div></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, query, orderBy, increment, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDSxk0kXJGs__nmtF4V4V_Ro_kkBhzE6IA", authDomain: "mohamed-play-store.firebaseapp.com",
  projectId: "mohamed-play-store", storageBucket: "mohamed-play-store.firebasestorage.app",
  messagingSenderId: "966596585443", appId: "1:966596585443:web:ac43976b53e72225ee62d6"
};
const app = initializeApp(firebaseConfig); const db = getFirestore(app);
const ADMIN_PASSWORD = 'mohamed123';
let currentSection = 'home'; let isAdminLoggedIn = false; let allAppsData = {};

document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons(); loadAppsFromFirestore();
  setTimeout(() => {
    document.getElementById('introScreen').classList.add('intro-fade-out');
    setTimeout(() => { document.getElementById('introScreen').style.display = 'none'; document.getElementById('mainApp').classList.remove('hidden'); document.getElementById('mainApp').classList.add('flex'); }, 1000);
  }, 3000);
  document.getElementById('menuBtn').onclick = () => { document.getElementById('drawerOverlay').classList.remove('hidden'); setTimeout(()=>{document.getElementById('drawerOverlay').classList.remove('opacity-0');document.getElementById('drawer').classList.remove('translate-x-full')},10) };
  document.getElementById('closeDrawer').onclick = () => { document.getElementById('drawerOverlay').classList.add('opacity-0');document.getElementById('drawer').classList.add('translate-x-full');setTimeout(()=>document.getElementById('drawerOverlay').classList.add('hidden'),300) };
  document.querySelectorAll('[data-nav]').forEach(btn => btn.onclick = (e) => switchSection(e.currentTarget.dataset.nav));
  document.querySelectorAll('.drawer-link').forEach(link => link.onclick = (e) => { e.preventDefault(); const modal = e.currentTarget.dataset.modal; if(modal) showGenericModal(modal); document.getElementById('closeDrawer').click(); });
  document.getElementById('searchInput').oninput = (e) => loadApps(currentSection, e.target.value.trim());
  document.getElementById('logoBtn').onclick = () => { showAdminLogin() };
  document.getElementById('adminLoginForm').onsubmit = handleAdminLogin;
  document.getElementById('addAppForm').onsubmit = handleAddApp;
});

async function loadAppsFromFirestore() {
  document.getElementById('loadingApps').classList.remove('hidden');
  try {
    const q = query(collection(db, "apps"), orderBy("name"));
    const querySnapshot = await getDocs(q); allAppsData = {};
    querySnapshot.forEach((doc) => { allAppsData[doc.id] = { id: doc.id,...doc.data() }; });
    document.getElementById('loadingApps').classList.add('hidden'); loadApps(currentSection);
    document.getElementById('totalApps').textContent = Object.keys(allAppsData).length;
    if (isAdminLoggedIn) updateAdminStats();
  } catch (error) { document.getElementById('loadingApps').classList.add('hidden'); showToast('خطأ: ' + error.message); }
}

function switchSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('active', 'text-[#01875f]'); btn.classList.add('text-gray-600', 'dark:text-gray-400'); if (btn.dataset.nav === section) { btn.classList.add('active', 'text-[#01875f]'); btn.classList.remove('text-gray-600', 'dark:text-gray-400'); } });
  const titles = { home: { title: 'التطبيقات المميزة', desc: 'اكتشف أفضل التطبيقات' }, games: { title: 'الألعاب', desc: 'مجموعة من الألعاب الممتعة' }, apps: { title: 'التطبيقات', desc: 'تطبيقات عملية' }, kids: { title: 'تطبيقات الأطفال', desc: 'محتوى آمن وتعليمي' } };
  document.getElementById('sectionTitle').textContent = titles[section].title; document.getElementById('sectionDesc').textContent = titles[section].desc; loadApps(section);
}

function loadApps(section, searchTerm = '') {
  const apps = Object.values(allAppsData); let appsToShow = section === 'home'? apps : apps.filter(app => app.category === section);
  let filteredApps = searchTerm? appsToShow.filter(app => app.name.toLowerCase().includes(searchTerm.toLowerCase())) : appsToShow; renderApps(filteredApps);
}

function renderApps(apps) {
  const grid = document.getElementById('appsGrid'); const noResults = document.getElementById('noResults');
  if (apps.length === 0) { grid.innerHTML = ''; noResults.classList.remove('hidden'); return; }
  noResults.classList.add('hidden');
  grid.innerHTML = apps.map(app => `
    <div class="app-card bg-white dark:bg-gray-800 rounded-2xl p-4 cursor-pointer border-gray-200 dark:border-gray-700" onclick="showAppDetail('${app.id}')">
      <div class="flex gap-3 mb-3"><img src="${app.icon}" class="w-16 h-16 rounded-2xl object-cover"><div><h3 class="font-bold truncate">${app.name}</h3><p class="text-sm text-gray-600 dark:text-gray-400">${app.developer}</p></div></div>
      <p class="text-xs text-gray-600 dark:text-gray-400 mb-3 line-clamp-2">${app.description}</p><div class="flex gap-2"><span class="px-3 py-1 bg-green-50 dark:bg-green-900 text-[#01875f] text-xs font-semibold rounded-full">${getCategoryName(app.category)}</span><span class="px-3 py-1 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-xs font-semibold rounded-full">${app.downloads||0} تحميل</span></div>
    </div>`).join(''); lucide.createIcons();
}

function getCategoryName(cat) { const names = { home: 'مميز', games: 'ألعاب', apps: 'تطبيقات', kids: 'أطفال' }; return names[cat] || cat; }

window.showAppDetail = async function(appId) {
  const app = allAppsData[appId]; if (!app) return;
  await updateDoc(doc(db, "apps", appId), { views: increment(1) });
  const modal = document.getElementById('appModal');
  document.getElementById('modalContent').innerHTML = `
  <div class="p-6">
    <div class="flex justify-between mb-4"><h2 class="text-2xl font-bold">${app.name}</h2><button onclick="closeAppModal()"><i data-lucide="x"></i></button></div>
    <img src="${app.icon}" class="w-24 h-24 rounded-3xl mb-4">
    <p class="mb-4">${app.description}</p>
    <a href="${app.downloadUrl}" target="_blank" onclick="incrementDownload('${appId}')" class="w-full block bg-[#01875f] text-white font-bold py-3.5 rounded-full text-center">تحميل</a>
  </div>`;
  modal.classList.remove('hidden'); modal.classList.add('flex'); lucide.createIcons();
}
window.closeAppModal = function() { document.getElementById('appModal').classList.add('hidden'); document.getElementById('appModal').classList.remove('flex'); }
window.incrementDownload = (id) => updateDoc(doc(db, "apps", id), { downloads: increment(1) });

function showAdminLogin() { document.getElementById('adminLoginModal').classList.remove('hidden'); document.getElementById('adminLoginModal').classList.add('flex'); }
window.closeAdminLogin = function() { document.getElementById('adminLoginModal').classList.add('hidden'); document.getElementById('adminLoginModal').classList.remove('flex'); }
function handleAdminLogin(e) { e.preventDefault(); if(document.getElementById('adminPassword').value === ADMIN_PASSWORD) { isAdminLoggedIn = true; closeAdminLogin(); document.getElementById('adminDashboard').classList.remove('hidden'); updateAdminStats(); showToast('تم الدخول'); } else { document.getElementById('loginError').textContent = 'كلمة السر غلط'; document.getElementById('loginError').classList.remove('hidden'); } }
window.closeAdminDashboard = function() { document.getElementById('adminDashboard').classList.add('hidden'); }
window.adminLogout = function() { isAdminLoggedIn = false; closeAdminDashboard(); showToast('تم الخروج'); }

function updateAdminStats() { const apps = Object.values(allAppsData); document.getElementById('totalDownloads').textContent = apps.reduce((sum, app) => sum + (app.downloads || 0), 0); document.getElementById('totalViews').textContent = apps.reduce((sum, app) => sum + (app.views || 0), 0); renderAppsListAdmin(); }
function renderAppsListAdmin() { const appsListAdmin = document.getElementById('appsListAdmin'); appsListAdmin.innerHTML = Object.values(allAppsData).map(app => `<div class="flex justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-xl"><div><p class="font-bold">${app.name}</p><p class="text-xs">${app.downloads||0} تحميل</p></div><button onclick="deleteApp('${app.id}')" class="px-3 py-2 bg-red-500 text-white text-xs rounded-lg">حذف</button></div>`).join(''); }

async function handleAddApp(e) { e.preventDefault(); const appData = { name: appName.value, developer: appDeveloper.value, category: appCategory.value, size: appSize.value, icon: appIcon.value, downloadUrl: appDownloadUrl.value, description: appDescription.value, screenshots: appScreenshots.value.split('\n').filter(url => url.trim()), features: appFeatures.value.split('\n').filter(f => f.trim()), downloads: 0, views: 0, rating: 5.0 }; await addDoc(collection(db, "apps"), appData); showToast('تمت الإضافة'); e.target.reset(); loadAppsFromFirestore(); }
window.deleteApp = async function(appId) { if(confirm('متأكد من الحذف؟')) { await deleteDoc(doc(db, "apps", appId)); showToast('تم الحذف'); loadAppsFromFirestore(); } }

function showGenericModal(type) {
  const modal = document.getElementById('genericModal');
  const content = document.getElementById('genericModalContent');
  if(type === 'settings') {
    const notifications = localStorage.getItem('notifications') === 'true';
    const darkMode = localStorage.getItem('darkMode') === 'true';
    content.innerHTML = `
    <div class="p-6">
      <div class="flex justify-between items-center mb-6"><h3 class="text-2xl font-bold">الإعدادات</h3><button onclick="closeGenericModal()"><i data-lucide="x"></i></button></div>
      <div class="space-y-4">
        <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-xl"><p class="font-semibold">إشعارات التطبيقات الجديدة</p><input type="checkbox" id="notifToggle" ${notifications? 'checked' : ''}></div>
        <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-xl"><p class="font-semibold">الوضع الليلي</p><input type="checkbox" id="darkToggle" ${darkMode? 'checked' : ''}></div>
        <button onclick="clearCache()" class="w-full bg-red-500 text-white py-2 rounded-xl">مسح الكاش</button>
      </div>
    </div>`;
    setTimeout(() => {
      document.getElementById('notifToggle').onchange = e => {localStorage.setItem('notifications', e.target.checked); showToast(e.target.checked?'تم تفعيل الاشعارات':'تم ايقاف الاشعارات')};
      document.getElementById('darkToggle').onchange = e => {localStorage.setItem('darkMode', e.target.checked); document.documentElement.classList.toggle('dark', e.target.checked); showToast(e.target.checked?'تم تفعيل الوضع الليلي':'تم ايقاف الوضع الليلي')};
      lucide.createIcons();
    }, 100);
  }
  else if(type === 'contact') { content.innerHTML = `<div class="p-6"><h3 class="text-2xl font-bold mb-4">تواصل معنا</h3><p>ابعتلنا رسالتك</p><button onclick="closeGenericModal()" class="mt-4 px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded">إغلاق</button></div>`; }
  else { content.innerHTML = `<div class="p-6"><h3 class="text-2xl font-bold mb-4">حول المتجر</h3><p>متجر MOHAMED PLAY STORE</p><button onclick="closeGenericModal()" class="mt-4 px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded">إغلاق</button></div>`; }
  modal.classList.remove('hidden'); modal.classList.add('flex');
}
window.closeGenericModal = function() { document.getElementById('genericModal').classList.add('hidden'); document.getElementById('genericModal').classList.remove('flex'); }
function clearCache() { localStorage.clear(); showToast('تم المسح'); location.reload(); }
function showToast(message) { const toast = document.getElementById('toast'); document.getElementById('toastMessage').textContent = message; toast.classList.remove('translate-y-20', 'opacity-0'); setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000); }
</script>
</body>
</html>
